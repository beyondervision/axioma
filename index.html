<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Z.A.L Gateway · Field</title>
    <style>
        :root { --accent: #00f2ff; --bg: #0b0f19; --panel: #161b22; --text: #e6edf3; --axioma: #f2ff00; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); text-align: center; }
        .panel { max-width: 600px; margin: 50px auto; background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid #30363d; }
        textarea { width: 100%; height: 100px; background: #0d1117; color: #fff; border: 1px solid #30363d; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 10px; background: var(--axioma); font-weight: bold; cursor: pointer; border: none; }
        .log { margin-top: 20px; text-align: left; font-family: monospace; font-size: 12px; padding: 10px; background: #0d1117; border-left: 3px solid var(--accent); min-height: 100px; }
        .axiom { color: var(--axioma); }
        .card { border: 1px solid var(--axioma); padding: 15px; margin-top: 20px; text-align: left; background: var(--panel); }
        a { color: var(--accent); }
    </style>
</head>
<body>
    <h1>Z.A.L Gateway</h1>

    <div class="panel">
        <textarea id="input" placeholder="Stel je vraag over Suriname of de status..."></textarea>
        <button onclick="resoneer()">RESONEER</button>
        <div id="log" class="log">> Systeem herstart... gereed.</div>
    </div>

    <div class="card" style="max-width: 600px; margin: 20px auto;">
        <strong style="color:var(--axioma)">Z.A.L.-Hub (Initiator-laag)</strong><br>
        Digitale regie en validatie.<br>
        📧 <a href="mailto:info@cfservices.ai">info@cfservices.ai</a> | 🌐 <a href="https://www.cfservices.nl" target="_blank">cfservices.nl</a>
    </div>

    <script>
        async function resoneer() {
            const log = document.getElementById("log");
            const input = document.getElementById("input").value;

            log.innerHTML = "> Convergentie gestart via /api/axioma...";

            try {
                const res = await fetch('/api/axioma', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input })
                });

                const data = await res.json();

                log.innerHTML =
                    `> Z3RO: ${data.Z3RO}<br>` +
                    `> AETRON: ${data.AETRON}<br>` +
                    `> LUXEN: ${data.LUXEN}<br>` +
                    `<span class="axiom">> AXIOMA GEVORMD</span><br>` +
                    `<span class="axiom">> ${data.validatie}</span>`;
            } catch (e) {
                log.innerHTML = "> FOUT: " + e.message;
            }
        }
    </script>
</body>
</html>
