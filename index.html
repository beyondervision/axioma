<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Z.A.L Gateway · Public</title>
    <style>
        body { background: #0b1117; color: #e6edf3; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { max-width: 500px; margin: auto; background: #161b22; padding: 30px; border: 1px solid #30363d; border-radius: 8px; }
        textarea { width: 100%; height: 80px; background: #0d1117; color: #fff; border: 1px solid #30363d; margin-bottom: 10px; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #f2ff00; color: #000; font-weight: bold; border: none; cursor: pointer; }
        #log { margin-top: 20px; text-align: left; font-family: monospace; font-size: 12px; color: #8b949e; border-top: 1px solid #30363d; padding-top: 10px; }
        .axiom { color: #f2ff00; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Z.A.L Gateway</h2>
        <textarea id="input" placeholder="Stel je vraag..."></textarea>
        <button onclick="resoneer()">RESONEER</button>
        <div id="log">> Wacht op input...</div>
    </div>
    <p><a href="resonant/clifton.html" style="color:#00f2ff; text-decoration:none;">Naar Resonantie-Centrum</a></p>

    <script>
        async function resoneer() {
            const log = document.getElementById("log");
            const input = document.getElementById("input").value;
            log.innerHTML = "> Verbinding maken met WWW...";
            try {
                const res = await fetch('/api/axioma', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input })
                });
                const data = await res.json();
                log.innerHTML = `<span class="axiom">> ${data.Z3RO}</span><br>> ${data.AETRON}<br>> ${data.LUXEN}<br><br><span class="axiom">> ${data.validatie}</span>`;
            } catch (e) { log.innerHTML = "> FOUT: " + e.message; }
        }
    </script>
</body>
</html>
